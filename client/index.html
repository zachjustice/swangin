<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swangin</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a1438; color: #e6ecff; font-family: ui-sans-serif, system-ui, sans-serif; }
      canvas { display: block; }
      #hud { position: fixed; inset: 0; pointer-events: none; }
      #hud .banner {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
        padding: 8px 14px; background: rgba(10, 20, 56, 0.6);
        border: 1px solid rgba(180, 200, 255, 0.2); border-radius: 8px;
        font-size: 14px; white-space: nowrap;
      }
      #hud .reticle {
        position: absolute; left: 50%; top: 50%;
        width: 8px; height: 8px; margin: -4px 0 0 -4px;
        border: 1px solid #e6ecff; border-radius: 50%; opacity: 0.85;
      }
      #hud .prompt {
        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
        padding: 8px 14px; background: rgba(10, 20, 56, 0.7);
        border: 1px solid rgba(180, 200, 255, 0.25); border-radius: 8px;
        font-size: 13px; pointer-events: auto; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="banner" id="banner">Booting…</div>
      <div class="reticle"></div>
      <div class="prompt" id="prompt" hidden>Click to test pointer lock</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
